name: Build IPA

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec App/project.yml --project App

      - name: Build (unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project App/SwiftPipe.xcodeproj \
            -scheme SwiftPipe \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/SwiftPipe.app"
          test -d "$APP_PATH"
          mkdir -p dist/Payload
          cp -R "$APP_PATH" dist/Payload/
          (cd dist && zip -qry SwiftPipe-unsigned.ipa Payload)

      - name: Collect dSYMs
        run: |
          mkdir -p dist/dSYMs
          find build/Build/Products/Release-iphoneos -name '*.dSYM' -maxdepth 2 \
            -exec cp -R {} dist/dSYMs/ \;
          (cd dist && zip -qry SwiftPipe-dSYMs.zip dSYMs)

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwiftPipe-unsigned-ipa
          path: dist/SwiftPipe-unsigned.ipa

      - name: Upload dSYMs artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwiftPipe-dSYMs
          path: dist/SwiftPipe-dSYMs.zip

      - name: Create release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/SwiftPipe-unsigned.ipa \
            dist/SwiftPipe-dSYMs.zip \
            --title "SwiftPipe $GITHUB_REF_NAME" \
            --generate-notes
